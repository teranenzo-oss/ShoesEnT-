<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShoesEnT</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#fff3ec,#ffe5d9);
}

header{
background:#ff5a2f;
color:white;
text-align:center;
padding:30px;
font-size:34px;
font-weight:bold;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:30px;
padding:30px;
perspective:1000px;
}

.card{
background:white;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
padding:15px;
text-align:center;
transition:transform 0.6s;
}

.card:hover{
transform:rotateY(10deg) rotateX(5deg) scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
transition:transform 1s;
}

.card:hover img{
transform:rotateY(360deg);
}

.nombre{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.precio{
color:#ff5a2f;
font-size:20px;
font-weight:bold;
}

.boton{
background:#25D366;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

</style>

</head>
